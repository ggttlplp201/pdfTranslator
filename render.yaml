# Render.com blueprint — deploy the hosted PDF Translator with one click.
# In the Render dashboard: New → Blueprint → point at this repo.
# Uses the Docker runtime so the image includes the Tesseract OCR binary
# (the Python runtime can't apt-install system packages).
services:
  - type: web
    name: pdftranslator
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      # Bring-your-own-key only: never store a key on the server.
      - key: PDFTRANSLATOR_BYOK_ONLY
        value: "1"

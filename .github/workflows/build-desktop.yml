name: Build desktop apps

# Builds the double-clickable Windows .exe and macOS .app. Pushing a version tag
# (e.g. v0.1.0) publishes them as a GitHub Release; manual runs leave them as
# downloadable workflow artifacts. PyInstaller can't cross-compile, so each
# binary is built on its own OS runner.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write  # needed to create/update the Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pyinstaller

      - name: Build
        run: pyinstaller --noconfirm --clean packaging/pdftranslator.spec

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: copy dist\pdfTranslator.exe pdfTranslator-windows.exe

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: cd dist && zip -r ../pdfTranslator-macos.zip pdfTranslator.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdfTranslator-${{ matrix.name }}
          path: |
            pdfTranslator-windows.exe
            pdfTranslator-macos.zip
          if-no-files-found: ignore

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pdfTranslator-windows.exe
            pdfTranslator-macos.zip
          fail_on_unmatched_files: false
